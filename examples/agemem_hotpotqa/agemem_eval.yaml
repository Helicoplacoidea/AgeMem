project: "Trinity-RFT-AgeMem"
name: "agemem-hotpotqa-eval"
checkpoint_root_dir: ${oc.env:TRINITY_CHECKPOINT_ROOT_DIR,./checkpoints}
mode: "bench"
algorithm:
  algorithm_type: grpo
  repeat_times: 1
model:
  model_path: ${oc.env:TRINITY_MODEL_PATH,/path/to/your/model/Qwen2.5-7B-Instruct/}
  max_response_tokens: 2048
  max_prompt_tokens: 8192
  lora_configs:
  - name: lora
    lora_rank: 32
    lora_alpha: 32
    path: ${oc.env:TRINITY_CHECKPOINT_ROOT_DIR,./checkpoints}/Trinity-RFT-AgeMem/agemem-hotpotqa-train/dummy_lora
cluster:
  node_num: 1
  gpu_per_node: 4
buffer:
  total_epochs: 20
  batch_size: 16
  explorer_input:
    taskset:
      name: hotpot_qa
      storage_type: file
      path: ${oc.env:HOTPOTQA_PATH,/path/to/dataset/hotpot_qa/fullwiki}
      split: 'train'
      format:
        prompt_key: 'question'
        response_key: 'answer'
      rollout_args:
        temperature: 0.8
      workflow_args:
        auto_summary_threshold: 0.8
        max_tool_rounds_per_turn: 10
        max_context_tokens: 8192
        stage2_distractor_messages: 3
        stage1_max_rounds: 5
        stage2_max_rounds: 5
        stage3_max_rounds: 5
        use_context_tools: True
        enable_stage2_in_eval: false
    eval_tasksets:
    - name: hotpot_qa-eval-fullwiki
      storage_type: file
      path: ${oc.env:HOTPOTQA_PATH,/path/to/dataset/hotpot_qa/fullwiki}
      repeat_times: 1
      split: 'test'
      total_steps: 50
      format:
        prompt_key: 'question'
        response_key: 'answer'
    default_workflow_type: 'AgeMem_hotpot_workflow_evaluation'
  trainer_input:
    experience_buffer:
      name: agemem_hotpotqa_buffer
      storage_type: queue
      path: 'sqlite:///agemem_hotpotqa_eval.db'
explorer:
  eval_interval: 50
  runner_per_model: 16
  max_timeout: 3600
  rollout_model:
    engine_num: 4
    tensor_parallel_size: 1
    enable_prefix_caching: true
    enforce_eager: true
    enable_history: true
    dtype: bfloat16
    seed: 42
    gpu_memory_utilization: 0.9
    enable_chunked_prefill: true
    enable_thinking: false
  eval_on_startup: false
  bench_on_latest_checkpoint: true
  env_vars:
    DASHSCOPE_API_KEY: ${oc.env:DASHSCOPE_API_KEY}
log:
  level: INFO
synchronizer:
  sync_method: 'checkpoint'
  sync_interval: 1
  sync_timeout: 7200
trainer:
  trainer_type: 'verl'
  save_interval: 20
  trainer_config:
    actor_rollout_ref:
      model:
        use_remove_padding: true
        enable_gradient_checkpointing: true
      actor:
        use_dynamic_bsz: true
        ppo_max_token_len_per_gpu: 16000
        ulysses_sequence_parallel_size: 2
        optim:
          lr: 1e-5
      ref:
        log_prob_use_dynamic_bsz: ${trainer.trainer_config.actor_rollout_ref.actor.use_dynamic_bsz}
        log_prob_max_token_len_per_gpu: ${trainer.trainer_config.actor_rollout_ref.actor.ppo_max_token_len_per_gpu}
        ulysses_sequence_parallel_size: ${trainer.trainer_config.actor_rollout_ref.actor.ulysses_sequence_parallel_size}

